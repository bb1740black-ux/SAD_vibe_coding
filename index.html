<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>埔里美食交流平台</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft JhengHei", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff3c4, #ffd1dc, #c9f7e8);
      color: #4b3b2f;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      color: #ff7b54;
      cursor: pointer;
      white-space: nowrap;
    }

    nav {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button, .file-label {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      background: #ff9f68;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 0 #d96b42;
      display: inline-block;
      text-align: center;
    }

    button:hover, .file-label:hover {
      transform: translateY(-2px);
      background: #ff7b54;
    }

    button:active, .file-label:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d96b42;
    }

    button.secondary {
      background: #68c3d4;
      box-shadow: 0 4px 0 #4095a6;
    }

    button.light {
      background: #ffffff;
      color: #ff7b54;
      border: 2px solid #ffb199;
      box-shadow: none;
    }

    button.danger {
      background: #ff6b6b;
      box-shadow: 0 4px 0 #c94f4f;
    }

    main {
      width: min(1100px, 94%);
      margin: 28px auto;
    }

    .page {
      display: none;
      animation: pop 0.28s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: center;
      background: rgba(255, 255, 255, 0.78);
      border: 4px solid white;
      border-radius: 32px;
      padding: 34px;
      box-shadow: 0 18px 35px rgba(255, 123, 84, 0.18);
    }

    .hero h1 {
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.1;
      color: #ff7b54;
      margin-bottom: 14px;
    }

    .hero p {
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .mascot {
      min-height: 260px;
      border-radius: 28px;
      background: linear-gradient(160deg, #ffcf70, #ff8fab);
      display: grid;
      place-items: center;
      font-size: 90px;
      box-shadow: inset 0 -12px 0 rgba(255,255,255,0.35);
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
      border: 3px solid white;
    }

    .form-wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    .form-wrap h2, .section-title {
      color: #ff7b54;
      font-size: 30px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      font-weight: 800;
    }

    input, textarea {
      width: 100%;
      border: 2px solid #ffd2bd;
      border-radius: 18px;
      padding: 13px 15px;
      outline: none;
      font-size: 16px;
      background: #fffdf8;
    }

    textarea {
      resize: vertical;
      min-height: 130px;
    }

    input:focus, textarea:focus {
      border-color: #ff8f5f;
      box-shadow: 0 0 0 4px rgba(255, 143, 95, 0.16);
    }

    input[type="file"] {
      display: none;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .hidden {
      display: none !important;
    }

    .profile-top {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      background: #ffe2a8;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .avatar.small {
      width: 48px;
      height: 48px;
      border-width: 3px;
    }

    .post-list {
      display: grid;
      gap: 18px;
      margin-top: 16px;
    }

    .post {
      background: #fffefb;
      border: 3px solid #fff;
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.07);
    }

    .post-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .post-id {
      font-weight: 900;
      color: #ff7b54;
    }

    .post-title {
      display: inline-block;
      background: #fff0aa;
      color: #7a4a00;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 19px;
      font-weight: 900;
      margin: 8px 0;
    }

    .post-content {
      line-height: 1.7;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }

    .post-img {
      width: 100%;
      max-height: 450px;
      object-fit: contain;
      background-color: #fffaf7;
      border-radius: 22px;
      margin-top: 8px;
      border: 3px solid #ffe3d3;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .icon-btn {
      background: #fff7e6;
      color: #6b4d32;
      border: 2px solid #ffd7a8;
      box-shadow: none;
      padding: 8px 14px;
    }

    .comment-box {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px dashed #ffd2bd;
    }

    .comment {
      background: #f8fff7;
      border-radius: 16px;
      padding: 10px 12px;
      margin: 9px 0;
      border: 1px solid #d7f3d1;
      line-height: 1.5;
    }

    .comment strong {
      color: #35a16b;
    }

    .comment-input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .comment-input-row input {
      flex: 1;
    }

    .empty {
      text-align: center;
      padding: 30px;
      border-radius: 22px;
      background: rgba(255,255,255,0.72);
      color: #8b6a54;
      font-weight: 800;
    }

    .notice {
      margin-top: 14px;
      padding: 12px 16px;
      background: #fff8d8;
      border-left: 6px solid #ffb703;
      border-radius: 16px;
      line-height: 1.6;
    }

    .preview {
      margin-top: 10px;
      max-width: 160px;
      border-radius: 18px;
      border: 3px solid #fff;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .grid-two {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 22px;
      align-items: start;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #755846;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      nav {
        justify-content: flex-start;
      }

      .hero, .grid-two {
        grid-template-columns: 1fr;
      }

      .mascot {
        min-height: 180px;
        font-size: 72px;
      }

      button, .file-label {
        padding: 9px 13px;
        font-size: 14px;
      }

      .comment-input-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo" onclick="showPage('homePage')">🍜 埔里美食交流平台</div>
    <nav>
      <button class="light" onclick="showPage('homePage')">首頁</button>
      <button class="light" onclick="showSharePage()">分享區</button>
      <button id="navProfile" class="light hidden" onclick="showProfilePage()">個人首頁</button>
      <button id="navLogin" onclick="showPage('authPage')">登入 / 註冊</button>
      <button id="navLogout" class="danger hidden" onclick="logout()">登出</button>
    </nav>
  </header>

  <main>
    <section id="homePage" class="page active">
      <div class="hero">
        <div>
          <h1>一起分享埔里最好吃的店！</h1>
          <p>不管是埔里在地小吃、甜點、飲料、火鍋、宵夜，都可以在這裡發文交流。登入後可以發貼文、按讚、留言，打造屬於大家的埔里美食地圖。</p>
          <button onclick="guardCreatePost()">＋ 新增貼文</button>
          <button class="secondary" onclick="showSharePage()">逛逛分享區</button>
          <div class="notice">未登入也可以看貼文與留言，但要留言或發文就需要先登入喔！</div>
        </div>
        <div class="mascot">🍱</div>
      </div>
    </section>

    <section id="authPage" class="page">
      <div class="form-wrap card">
        <div class="tabs">
          <button id="loginTab" onclick="switchAuth('login')">登入</button>
          <button id="registerTab" class="secondary" onclick="switchAuth('register')">註冊</button>
        </div>

        <div id="loginBox">
          <h2>會員登入</h2>
          <label>帳號 ID</label>
          <input id="loginId" placeholder="請輸入 ID" />
          <label>密碼</label>
          <input id="loginPassword" type="password" placeholder="請輸入密碼" />
          <br><br>
          <button onclick="login()">登入平台</button>
        </div>

        <div id="registerBox" class="hidden">
          <h2>建立新帳號</h2>
          <label>帳號 ID</label>
          <input id="regId" placeholder="例如 puli_food_01" />
          <label>名稱</label>
          <input id="regName" placeholder="例如 埔里美食王" />
          <label>密碼</label>
          <input id="regPassword" type="password" placeholder="請設定密碼" />
          <label>上傳頭貼</label>
          <label class="file-label" for="regAvatar">選擇頭貼圖片</label>
          <input id="regAvatar" type="file" accept="image/*" onchange="previewImage(this, 'avatarPreview')" />
          <img id="avatarPreview" class="preview hidden" alt="頭貼預覽" />
          <br><br>
          <button onclick="register()">完成註冊</button>
        </div>
      </div>
    </section>

    <section id="profilePage" class="page">
      <div class="card">
        <div class="profile-top">
          <img id="profileAvatar" class="avatar" alt="頭貼" />
          <div>
            <h2 id="profileName" class="section-title"></h2>
            <p id="profileId"></p>
          </div>
          <button onclick="showCreatePostPage()">＋ 新增貼文</button>
        </div>
      </div>

      <h2 class="section-title" style="margin-top: 24px;">我的貼文紀錄</h2>
      <div id="myPosts" class="post-list"></div>
    </section>

    <section id="createPostPage" class="page">
      <div class="grid-two">
        <div class="card">
          <h2 class="section-title">發布新貼文</h2>
          <div class="profile-top">
            <img id="postAvatar" class="avatar" alt="頭貼" />
            <div>
              <strong id="postUserName"></strong>
              <p id="postUserId"></p>
            </div>
          </div>
          <label>發布主題</label>
          <input id="postTitle" placeholder="例如：埔里必吃滷肉飯" />
          <label>發布內容</label>
          <textarea id="postContent" placeholder="分享店名、價格、口味、推薦原因……"></textarea>
          <label>上傳照片（可選）</label>
          <label class="file-label" for="postImage">選擇美食照片</label>
          <input id="postImage" type="file" accept="image/*" onchange="previewImage(this, 'postPreview')" />
          <img id="postPreview" class="preview hidden" alt="貼文圖片預覽" />
          <br><br>
          <button onclick="createPost()">發布貼文</button>
          <button class="secondary" onclick="showProfilePage()">返回個人首頁</button>
        </div>

        <div class="card">
          <h2 class="section-title">發文小提醒</h2>
          <p style="line-height: 1.8;">可以寫下店名、地點、推薦餐點、價位、用餐心得。照片不是必填，但有照片會讓貼文更吸引人！</p>
          <div class="mascot" style="margin-top: 18px; min-height: 210px;">🥤</div>
        </div>
      </div>
    </section>

    <section id="sharePage" class="page">
      <h2 class="section-title">大家的埔里美食分享區</h2>
      <div id="sharePosts" class="post-list"></div>
    </section>
  </main>

  <footer>🍰 Puli Food Share｜埔里美食交流平台</footer>

  <script>
    const defaultAvatar = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
      <svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'>
        <rect width='100%' height='100%' rx='60' fill='#ffe2a8'/>
        <circle cx='42' cy='48' r='8' fill='#7a4a00'/>
        <circle cx='78' cy='48' r='8' fill='#7a4a00'/>
        <path d='M42 75 Q60 92 78 75' stroke='#7a4a00' stroke-width='7' fill='none' stroke-linecap='round'/>
      </svg>
    `);

    let currentUser = JSON.parse(localStorage.getItem("puliCurrentUser")) || null;
    let users = JSON.parse(localStorage.getItem("puliUsers")) || [];
    let posts = JSON.parse(localStorage.getItem("puliPosts")) || [];

    function saveData() {
      localStorage.setItem("puliUsers", JSON.stringify(users));
      localStorage.setItem("puliPosts", JSON.stringify(posts));
      localStorage.setItem("puliCurrentUser", JSON.stringify(currentUser));
    }

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
      document.getElementById(pageId).classList.add("active");
      updateNav();
    }

    function updateNav() {
      document.getElementById("navLogin").classList.toggle("hidden", !!currentUser);
      document.getElementById("navLogout").classList.toggle("hidden", !currentUser);
      document.getElementById("navProfile").classList.toggle("hidden", !currentUser);
    }

    function switchAuth(type) {
      const isLogin = type === "login";
      document.getElementById("loginBox").classList.toggle("hidden", !isLogin);
      document.getElementById("registerBox").classList.toggle("hidden", isLogin);
      document.getElementById("loginTab").className = isLogin ? "" : "secondary";
      document.getElementById("registerTab").className = isLogin ? "secondary" : "";
    }

    function previewImage(input, previewId) {
      const file = input.files[0];
      const preview = document.getElementById(previewId);
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        preview.src = e.target.result;
        preview.classList.remove("hidden");
      };
      reader.readAsDataURL(file);
    }

    function getFileBase64(inputId) {
      return new Promise(resolve => {
        const fileInput = document.getElementById(inputId);
        const file = fileInput.files[0];
        if (!file) return resolve("");

        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    async function register() {
      const id = document.getElementById("regId").value.trim();
      const name = document.getElementById("regName").value.trim();
      const password = document.getElementById("regPassword").value.trim();
      const avatar = await getFileBase64("regAvatar") || defaultAvatar;

      if (!id || !name || !password) {
        alert("請完整填寫 ID、名稱、密碼！");
        return;
      }

      if (users.some(user => user.id === id)) {
        alert("這個 ID 已經被註冊囉！");
        return;
      }

      users.push({ id, name, password, avatar });
      saveData();
      alert("註冊成功！請重新登入。");
      switchAuth("login");
      document.getElementById("loginId").value = id;
      document.getElementById("regId").value = "";
      document.getElementById("regName").value = "";
      document.getElementById("regPassword").value = "";
      document.getElementById("regAvatar").value = "";
      document.getElementById("avatarPreview").classList.add("hidden");
    }

    function login() {
      const id = document.getElementById("loginId").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      const user = users.find(user => user.id === id && user.password === password);

      if (!user) {
        alert("登入失敗，請確認 ID 或密碼是否正確！");
        return;
      }

      currentUser = user;
      saveData();
      alert(`歡迎回來，${user.name}！`);
      showProfilePage();
    }

    function logout() {
      currentUser = null;
      saveData();
      alert("已登出！");
      showPage("homePage");
    }

    function guardCreatePost() {
      if (!currentUser) {
        const goLogin = confirm("發布貼文需要登入。是否已有平台帳號？按確定前往登入／註冊頁面。");
        if (goLogin) showPage("authPage");
        return;
      }
      showCreatePostPage();
    }

    function showProfilePage() {
      if (!currentUser) {
        showPage("authPage");
        return;
      }

      document.getElementById("profileAvatar").src = currentUser.avatar || defaultAvatar;
      document.getElementById("profileName").textContent = currentUser.name;
      document.getElementById("profileId").textContent = `ID：${currentUser.id}`;
      renderMyPosts();
      showPage("profilePage");
    }

    function showCreatePostPage() {
      if (!currentUser) return showPage("authPage");
      document.getElementById("postAvatar").src = currentUser.avatar || defaultAvatar;
      document.getElementById("postUserName").textContent = currentUser.name;
      document.getElementById("postUserId").textContent = `ID：${currentUser.id}`;
      showPage("createPostPage");
    }

    async function createPost() {
      const title = document.getElementById("postTitle").value.trim();
      const content = document.getElementById("postContent").value.trim();
      const image = await getFileBase64("postImage");

      if (!title || !content) {
        alert("請填寫發布主題與發布內容！");
        return;
      }

      posts.unshift({
        postId: Date.now(),
        userId: currentUser.id,
        userName: currentUser.name,
        avatar: currentUser.avatar || defaultAvatar,
        title,
        content,
        image,
        likes: [],
        comments: [],
        createdAt: new Date().toLocaleString("zh-TW")
      });

      saveData();
      alert("貼文發布成功！已同步到分享區與個人首頁。");
      document.getElementById("postTitle").value = "";
      document.getElementById("postContent").value = "";
      document.getElementById("postImage").value = "";
      document.getElementById("postPreview").classList.add("hidden");
      showSharePage();
    }

    function showSharePage() {
      renderSharePosts();
      showPage("sharePage");
    }

    function renderMyPosts() {
      const myPosts = currentUser ? posts.filter(post => post.userId === currentUser.id) : [];
      const container = document.getElementById("myPosts");
      container.innerHTML = myPosts.length ? myPosts.map(post => postTemplate(post)).join("") : `<div class="empty">目前還沒有貼文，快去分享第一篇埔里美食吧！</div>`;
    }

    function renderSharePosts() {
      const container = document.getElementById("sharePosts");
      container.innerHTML = posts.length ? posts.map(post => postTemplate(post)).join("") : `<div class="empty">目前分享區還沒有貼文，登入後可以成為第一位美食分享者！</div>`;
    }

    function postTemplate(post) {
      const liked = currentUser && post.likes.includes(currentUser.id);
      const commentsHtml = post.comments.length
        ? post.comments.map(comment => `<div class="comment"><strong>${escapeHtml(comment.userName)}：</strong>${escapeHtml(comment.text)}</div>`).join("")
        : `<div class="comment">目前還沒有留言。</div>`;

      return `
        <article class="post">
          <div class="post-head">
            <img class="avatar small" src="${post.avatar || defaultAvatar}" alt="頭貼">
            <div>
              <div class="post-id">${escapeHtml(post.userName)}｜@${escapeHtml(post.userId)}</div>
              <small>${post.createdAt}</small>
            </div>
          </div>
          <div class="post-title">${escapeHtml(post.title)}</div>
          <div class="post-content">${escapeHtml(post.content)}</div>
          ${post.image ? `<img class="post-img" src="${post.image}" alt="貼文圖片">` : ""}
          <div class="actions">
            <button class="icon-btn" onclick="toggleLike(${post.postId})">${liked ? "❤️" : "🤍"} 按讚 ${post.likes.length}</button>
            <button class="icon-btn" onclick="focusComment(${post.postId})">💬 評論 ${post.comments.length}</button>
            ${currentUser && currentUser.id === post.userId ? `<button class="icon-btn" style="color: #c94f4f;" onclick="deletePost(${post.postId})">🗑️ 刪除</button>` : ""}
          </div>
          <div class="comment-box">
            ${commentsHtml}
            ${currentUser ? `
              <div class="comment-input-row">
                <input id="comment-${post.postId}" placeholder="輸入留言……">
                <button onclick="addComment(${post.postId})">送出</button>
              </div>
            ` : `
              <button class="secondary" onclick="askLoginForComment()">登入後留言</button>
            `}
          </div>
        </article>
      `;
    }

    function toggleLike(postId) {
      if (!currentUser) {
        askLoginForComment();
        return;
      }

      const post = posts.find(post => post.postId === postId);
      if (!post) return;

      if (post.likes.includes(currentUser.id)) {
        post.likes = post.likes.filter(id => id !== currentUser.id);
      } else {
        post.likes.push(currentUser.id);
      }

      saveData();
      refreshCurrentPostList();
    }

    function focusComment(postId) {
      if (!currentUser) {
        askLoginForComment();
        return;
      }
      const input = document.getElementById(`comment-${postId}`);
      if (input) input.focus();
    }

    function addComment(postId) {
      if (!currentUser) return askLoginForComment();

      const input = document.getElementById(`comment-${postId}`);
      const text = input.value.trim();
      if (!text) {
        alert("請先輸入留言內容！");
        return;
      }

      const post = posts.find(post => post.postId === postId);
      if (!post) return;

      post.comments.push({
        userId: currentUser.id,
        userName: currentUser.name,
        text,
        createdAt: new Date().toLocaleString("zh-TW")
      });

      saveData();
      refreshCurrentPostList();
    }

    function askLoginForComment() {
      const goLogin = confirm("是否有平台帳號？登入後即可按讚或留言，按確定前往登入／註冊頁面。");
      if (goLogin) showPage("authPage");
    }

    function deletePost(postId) {
      if (!confirm("確定要刪除這篇貼文嗎？刪除後將無法復原。")) return;
      
      posts = posts.filter(post => post.postId !== postId);
      saveData();
      alert("貼文已刪除！");
      refreshCurrentPostList();
    }

    function refreshCurrentPostList() {
      if (document.getElementById("profilePage").classList.contains("active")) renderMyPosts();
      if (document.getElementById("sharePage").classList.contains("active")) renderSharePosts();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    updateNav();
  </script>
</body>
</html>
